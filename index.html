<!doctype html>
<html>
	<head>
		<link rel="stylesheet" href="index.css">
	</head>
	<body id="body">
		<header>
			<img src="images/pumpkin.png">
			<div>
				<h1 id="header-top-heading">Pumpkin's Purrfect...</h1>
				<p id="header-bottom-heading">Meme Picker</p>	
			</div>
		</header>
		<main id="main-section">
			<!-- <p id="main-heading">Select Your Current Emotion</p> -->
			<div id="emotions">
				<!-- render emotions from js -->
			</div>
			<div id="checkboxes">
				<div id="gifs-section">
					<label for="gifs-only" id="gifs-header">Animated Gifs Only</label>
					<input type="checkbox" id="gifs-only">
				</div>
				<div id="multiple-memes-section">
					<label for="multi-memes" id="gifs-header">All memes at once</label>
					<input type="checkbox" id="multi-memes">
				</div>
			</div>
			<button id="get-image">Get Image</button>
			<div id="show-cat">
				<!-- show the cat image -->
				<button id="close-btn">X</button>
			</div>
			<p id="message">Selected Cats are not available</p>
		</main>
		<script src="index.js" type="module"></script>
	</body>
</html>
